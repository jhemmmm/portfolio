<!doctype html>
<html lang="en" class="dark">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="Jheamuel Panuelos - Full-Stack Engineer. Scalable systems, video platforms, distributed infrastructure." />
        <title>Jheamuel Panuelos - Full-Stack Engineer</title>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
        <script>
            (function () {
                const stored = localStorage.getItem("portfolio-theme");
                if (stored === "light") {
                    document.documentElement.classList.remove("dark");
                } else {
                    document.documentElement.classList.add("dark");
                }
            })();
        </script>
    </head>
    <body class="bg-white dark:bg-surface text-gray-900 dark:text-white transition-colors duration-300">
        <div id="app"></div>
        <script type="module" src="/src/main.js"></script>
    </body>
</html>
